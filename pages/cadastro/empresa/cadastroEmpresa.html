        </div>

        <div class="container">
            <form class="cont">

                <div style="display: flex; flex-direction: row; gap: 20px;">
                    <div style="width: 50%;">
                        <label for="razao_social">Razão Social *</label><br>
                        <input type="text" id="razao_social"><br>
                    </div>
                    <div style="width: 50%;">
                        <label for="nome_fantasia">Nome Fantasia *</label><br>
                        <input type="text" id="nome_fantasia"><br>
                    </div>
                </div>

                <label for="endereco_comercial">Endereço Comercial *</label><br>
                <input type="text" id="endereco_comercial"><br>

                <div style="display: flex; flex-direction: row; gap: 20px;">
                    <div style="width: 50%;">
                        <label for="setor_atuacao">Setor de Atuação *</label><br>
                        <input type="text" id="setor_atuacao"><br>
                    </div>
                    <div style="width: 50%;">
                        <label for="email_corporativo">E-mail Corporativo *</label><br>
                        <input type="email" id="email_corporativo"><br>
                    </div>
                </div>

                <label for="cnpj">CNPJ *</label><br>
                <input type="text" id="cnpj"><br>

                <div>
                    <div style="display: flex; flex-direction: row; gap: 15px;">
                        <div style="width: 50%; width: 50%;">
                            <label for="senha">Senha *</label><br>
                            
                            <div style="width: 100%;">
                                <div style="position: relative; width: 85%;">
                                <input type="password" id="senha" style="width: 100%; padding-right: 30px;" class="senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="gray"
                                    class="bi bi-eye" viewBox="0 0 16 16"
                                    style="position: absolute; left: 99%; top: 50%; transform: translateY(-50%); cursor: pointer;">
                                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 
                 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 
                 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 
                 0 0 1 1.172 8z" />
                                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 
                 7 0 3.5 3.5 0 0 1-7 0" />
                                </svg>
                            </div>
                            </div>

                        </div>
                        <div style="width: 50%; width: 50%;">
                            <label for="confirmar_senha">Confirmar Senha *</label><br>
                            <div style="position: relative; width: 86%;">
                                <input type="password" id="confirmar_senha" style="width: 100%; padding-right: 30px;" class="senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="gray"
                                    class="bi bi-eye" viewBox="0 0 16 16"
                                    style="position: absolute; left: 99%; top: 50%; transform: translateY(-50%); cursor: pointer;">
                                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668

                 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 
                 0 0 1 1.172 8z" />
                                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 
                 7 0 3.5 3.5 0 0 1-7 0" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <button id="btn-cadastrar">Cadastrar</button>
            </form>
        </div>
