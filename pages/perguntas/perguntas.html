        <div class="infos">
            <button class="btn-principal"
                data-texto="O estágio obrigatório é uma atividade prática exigida pela grade curricular de muitos cursos de graduação e técnicos. Ele tem como objetivo aproximar o estudante da realidade do mercado de trabalho, permitindo a aplicação dos conhecimentos aprendidos em sala de aula. Além de ser requisito para a conclusão do curso, o estágio obrigatório contribui para o desenvolvimento profissional e para a vivência de situações reais da área de formação.">
                <div class="btn-toggle">

            </button>
            <button class="btn-principal"
                data-texto="O estágio obrigatório é uma exigência prevista na grade curricular de diversos cursos técnicos e de graduação, com carga horária que varia conforme a área de formação e a instituição de ensino. Em cursos de graduação, o tempo de estágio geralmente corresponde a um total entre 200 e 400 horas, distribuídas ao longo de um ou mais semestres. Já em cursos técnicos, essa carga costuma ser menor, situando-se, em média, entre 120 e 300 horas. A definição exata está descrita no projeto pedagógico do curso ou no regulamento da instituição, sendo imprescindível que o estudante cumpra integralmente esse período para que possa concluir sua formação e receber o diploma.">
